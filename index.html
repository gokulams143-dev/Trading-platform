<!DOCTYPE html>
<html>

<head>

<title>Trading Platform</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.topbar{
height:50px;
background:#111827;
display:flex;
align-items:center;
padding:0 20px;
font-size:14px;
}

.main{
display:grid;
grid-template-columns:250px 1fr 300px;
height:calc(100vh - 50px);
}

.market{
background:#111827;
padding:10px;
}

.chart{
background:black;
}

.trade{
background:#111827;
padding:15px;
}

.bottom{
height:200px;
background:#111827;
padding:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.buy{
background:#16a34a;
}

.sell{
background:#dc2626;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="topbar">
BTCUSDT | Balance: $10000 | Equity: $10000 | PnL: $0
</div>

<div class="main">

<div class="market">

<h3>Market Watch</h3>

<p>BTCUSDT</p>
<p>ETHUSDT</p>
<p>SOLUSDT</p>

</div>

<div class="chart">

<div id="chart"></div>

</div>

<div class="trade">

<h3>Trade</h3>

Lot Size
<input id="size" value="1">

Stop Loss
<input id="sl">

Take Profit
<input id="tp">

<button class="buy" onclick="buy()">BUY</button>

<button class="sell" onclick="sell()">SELL</button>

<button onclick="closeTrade()">Close Trade</button>

<h3>Position</h3>

<div id="position">No open trade</div>

</div>

</div>

<div class="bottom">

<h3>Positions</h3>

Symbol | Entry | Size | PnL

</div>

<script>

let currentPrice = 0;
let position = null;

new TradingView.widget({
  "container_id": "chart",
  "symbol": "BINANCE:BTCUSDT",
  "interval": "1",
  "width": "100%",
  "height": "600"
});

const ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

ws.onmessage = function(event){

const data = JSON.parse(event.data);

currentPrice = parseFloat(data.p);

updatePnL();

};

function buy(){

position = {
side:"BUY",
entry:currentPrice,
size:parseFloat(document.getElementById("size").value),
sl:parseFloat(document.getElementById("sl").value),
tp:parseFloat(document.getElementById("tp").value)
};

updatePosition();

}

function sell(){

position = {
side:"SELL",
entry:currentPrice,
size:parseFloat(document.getElementById("size").value),
sl:parseFloat(document.getElementById("sl").value),
tp:parseFloat(document.getElementById("tp").value)
};

updatePosition();

}

function updatePosition(){

if(!position){

document.getElementById("position").innerHTML="No open trade";

return;

}

document.getElementById("position").innerHTML=
"Side: "+position.side+
"<br>Entry: "+position.entry;

}

function updatePnL(){

if(!position) return;

let pnl=0;

if(position.side==="BUY"){

pnl=currentPrice-position.entry;

if(position.sl && currentPrice<=position.sl) closeTrade();
if(position.tp && currentPrice>=position.tp) closeTrade();

}else{

pnl=position.entry-currentPrice;

if(position.sl && currentPrice>=position.sl) closeTrade();
if(position.tp && currentPrice<=position.tp) closeTrade();

}

document.getElementById("position").innerHTML=
"Side: "+position.side+
"<br>Entry: "+position.entry+
"<br>Price: "+currentPrice+
"<br>PnL: "+pnl.toFixed(2);

}

function closeTrade(){

if(!position) return;

alert("Trade closed");

position=null;

updatePosition();

}

</script>

</body>

</html>
