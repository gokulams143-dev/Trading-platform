<!DOCTYPE html>
<html>

<head>

<title>Trading Platform</title>

<script src="https://s3.tradingview.com/tv.js"></script>

</head>

<body>

<h2>Trading Platform Prototype</h2>

<div id="chart"></div>

<br>

<button onclick="buy()">BUY</button>
<button onclick="sell()">SELL</button>

<h3>Position</h3>

<div id="position">No open trade</div>

<script>

let currentPrice = 0;
let position = null;

new TradingView.widget({
  "container_id": "chart",
  "symbol": "BINANCE:BTCUSDT",
  "interval": "1",
  "width": "100%",
  "height": "500"
});


const ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

ws.onmessage = function(event){

const data = JSON.parse(event.data);

currentPrice = parseFloat(data.p);

updatePnL();

};


function buy(){

position = {
side:"BUY",
entry:currentPrice
};

updatePosition();

}


function sell(){

position = {
side:"SELL",
entry:currentPrice
};

updatePosition();

}


function updatePosition(){

if(!position){

document.getElementById("position").innerHTML="No open trade";

return;

}

document.getElementById("position").innerHTML=
"Side: "+position.side+
"<br>Entry: "+position.entry;

}


function updatePnL(){

if(!position) return;

let pnl=0;

if(position.side==="BUY"){

pnl=currentPrice-position.entry;

}else{

pnl=position.entry-currentPrice;

}

document.getElementById("position").innerHTML=
"Side: "+position.side+
"<br>Entry: "+position.entry+
"<br>Price: "+currentPrice+
"<br>PnL: "+pnl.toFixed(2);

}

</script>

</body>

</html>
